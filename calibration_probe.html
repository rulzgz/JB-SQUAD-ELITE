<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; }
        .canvas-container { position: relative; width: 1080px; height: 1350px; }
        img { width: 100%; height: 100%; display: block; }
        .grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(255,0,0,0.3) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,0,0,0.3) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .center-axis {
            position: absolute; top: 0; left: 50%; width: 2px; height: 100%;
            background: yellow; border-left: 2px dashed black;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <img src="file:///c:/Users/yeibi/Desktop/PROYECTOS/JB-SQUAD/img/emerald_pitch.png">
        <div class="grid"></div>
        <div class="center-axis"></div>
    </div>
</body>
</html>
